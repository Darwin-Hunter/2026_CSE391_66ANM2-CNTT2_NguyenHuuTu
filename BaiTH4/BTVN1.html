<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bài tập về nhà 1 - Nâng cấp Form Đăng Ký</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 30px auto;
      padding: 0 16px;
      background: #f8f9fa;
    }

    h1 {
      text-align: center;
      color: #1f4e79;
      margin-bottom: 24px;
    }

    form {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .input-wrap {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      user-select: none;
      font-size: 18px;
    }

    .error {
      color: red;
      font-size: 14px;
      display: block;
      margin-top: 4px;
      min-height: 18px;
    }

    .valid {
      border-color: green !important;
    }

    .invalid {
      border-color: red !important;
    }

    .count-text {
      text-align: right;
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .strength-box {
      margin-top: 8px;
    }

    .strength-bar-wrap {
      width: 100%;
      height: 10px;
      background: #e9ecef;
      border-radius: 999px;
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      transition: 0.3s;
    }

    .strength-text {
      margin-top: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .radio-group, .checkbox-group {
      margin-top: 6px;
    }

    .radio-group label,
    .checkbox-group label {
      display: inline;
      font-weight: normal;
      margin-right: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1f7aec;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .success-box {
      display: none;
      background: #d1e7dd;
      color: #0f5132;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <h1> Đăng Ký Tài Khoản</h1>

  <form id="registerForm">
    <div class="form-group">
      <label for="fullname">Họ và tên</label>
      <input type="text" id="fullname" maxlength="50" />
      <div class="count-text" id="fullnameCount">0/50</div>
      <span class="error" id="fullnameError"></span>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" />
      <span class="error" id="emailError"></span>
    </div>

    <div class="form-group">
      <label for="phone">Số điện thoại</label>
      <input type="text" id="phone" />
      <span class="error" id="phoneError"></span>
    </div>

    <div class="form-group">
      <label for="password">Mật khẩu</label>
      <div class="input-wrap">
        <input type="password" id="password" />
        <span class="toggle-password" id="togglePassword">👁</span>
      </div>

      <div class="strength-box">
        <div class="strength-bar-wrap">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="strength-text" id="strengthText">Chưa nhập mật khẩu</div>
      </div>

      <span class="error" id="passwordError"></span>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Xác nhận mật khẩu</label>
      <input type="password" id="confirmPassword" />
      <span class="error" id="confirmPasswordError"></span>
    </div>

    <div class="form-group">
      <label>Giới tính</label>
      <div class="radio-group">
        <input type="radio" name="gender" id="male" value="Nam" />
        <label for="male">Nam</label>

        <input type="radio" name="gender" id="female" value="Nữ" />
        <label for="female">Nữ</label>

        <input type="radio" name="gender" id="other" value="Khác" />
        <label for="other">Khác</label>
      </div>
      <span class="error" id="genderError"></span>
    </div>

    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="terms" />
        <label for="terms">Tôi đồng ý với điều khoản</label>
      </div>
      <span class="error" id="termsError"></span>
    </div>

    <button type="submit">Đăng ký</button>
  </form>

  <div class="success-box" id="successBox"></div>

  <script>
    const form = document.getElementById("registerForm");
    const successBox = document.getElementById("successBox");

    const fullname = document.getElementById("fullname");
    const fullnameCount = document.getElementById("fullnameCount");
    const email = document.getElementById("email");
    const phone = document.getElementById("phone");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const togglePassword = document.getElementById("togglePassword");
    const terms = document.getElementById("terms");

    const strengthBar = document.getElementById("strengthBar");
    const strengthText = document.getElementById("strengthText");

    function showError(fieldId, message) {
      const field = document.getElementById(fieldId);
      const error = document.getElementById(fieldId + "Error");
      if (field) {
        field.classList.add("invalid");
        field.classList.remove("valid");
      }
      error.textContent = message;
    }

    function clearError(fieldId) {
      const field = document.getElementById(fieldId);
      const error = document.getElementById(fieldId + "Error");
      if (field) {
        field.classList.remove("invalid");
        field.classList.add("valid");
      }
      error.textContent = "";
    }

    function showGroupError(errorId, message) {
      document.getElementById(errorId).textContent = message;
    }

    function clearGroupError(errorId) {
      document.getElementById(errorId).textContent = "";
    }

    function validateFullname() {
      const value = fullname.value.trim();
      const regex = /^[a-zA-ZÀ-ỹ\s]+$/;

      if (value === "") {
        showError("fullname", "Họ và tên không được để trống");
        return false;
      }
      if (value.length < 3) {
        showError("fullname", "Họ và tên phải có ít nhất 3 ký tự");
        return false;
      }
      if (!regex.test(value)) {
        showError("fullname", "Họ và tên chỉ chứa chữ cái và khoảng trắng");
        return false;
      }

      clearError("fullname");
      return true;
    }

    function validateEmail() {
      const value = email.value.trim();
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (value === "") {
        showError("email", "Email không được để trống");
        return false;
      }
      if (!regex.test(value)) {
        showError("email", "Email không đúng định dạng");
        return false;
      }

      clearError("email");
      return true;
    }

    function validatePhone() {
      const value = phone.value.trim();
      const regex = /^0[0-9]{9}$/;

      if (value === "") {
        showError("phone", "Số điện thoại không được để trống");
        return false;
      }
      if (!regex.test(value)) {
        showError("phone", "Số điện thoại phải gồm 10 số và bắt đầu bằng 0");
        return false;
      }

      clearError("phone");
      return true;
    }

    function validatePassword() {
      const value = password.value;
      const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

      if (value === "") {
        showError("password", "Mật khẩu không được để trống");
        return false;
      }
      if (!regex.test(value)) {
        showError("password", "Mật khẩu phải >= 8 ký tự, có chữ hoa, chữ thường và số");
        return false;
      }

      clearError("password");
      return true;
    }

    function validateConfirmPassword() {
      const value = confirmPassword.value;

      if (value === "") {
        showError("confirmPassword", "Vui lòng xác nhận mật khẩu");
        return false;
      }
      if (value !== password.value) {
        showError("confirmPassword", "Mật khẩu xác nhận không khớp");
        return false;
      }

      clearError("confirmPassword");
      return true;
    }

    function validateGender() {
      const gender = document.querySelector('input[name="gender"]:checked');
      if (!gender) {
        showGroupError("genderError", "Vui lòng chọn giới tính");
        return false;
      }
      clearGroupError("genderError");
      return true;
    }

    function validateTerms() {
      if (!terms.checked) {
        showGroupError("termsError", "Bạn phải đồng ý với điều khoản");
        return false;
      }
      clearGroupError("termsError");
      return true;
    }

    function updateFullnameCount() {
      fullnameCount.textContent = `${fullname.value.length}/50`;
    }

    function checkPasswordStrength(value) {
      let score = 0;

      if (value.length >= 8) score++;
      if (/[a-z]/.test(value)) score++;
      if (/[A-Z]/.test(value)) score++;
      if (/\d/.test(value)) score++;
      if (/[^A-Za-z0-9]/.test(value)) score++;

      if (value.length === 0) {
        strengthBar.style.width = "0%";
        strengthBar.style.background = "transparent";
        strengthText.textContent = "Chưa nhập mật khẩu";
        strengthText.style.color = "#666";
        return;
      }

      if (score <= 2) {
        strengthBar.style.width = "33%";
        strengthBar.style.background = "red";
        strengthText.textContent = "Mức độ mạnh: Yếu";
        strengthText.style.color = "red";
      } else if (score <= 4) {
        strengthBar.style.width = "66%";
        strengthBar.style.background = "orange";
        strengthText.textContent = "Mức độ mạnh: Trung bình";
        strengthText.style.color = "orange";
      } else {
        strengthBar.style.width = "100%";
        strengthBar.style.background = "green";
        strengthText.textContent = "Mức độ mạnh: Mạnh";
        strengthText.style.color = "green";
      }
    }

    togglePassword.addEventListener("click", function () {
      if (password.type === "password") {
        password.type = "text";
      } else {
        password.type = "password";
      }
    });

    fullname.addEventListener("input", function () {
      updateFullnameCount();
      document.getElementById("fullnameError").textContent = "";
      fullname.classList.remove("invalid");
    });

    email.addEventListener("input", function () {
      document.getElementById("emailError").textContent = "";
      email.classList.remove("invalid");
    });

    phone.addEventListener("input", function () {
      document.getElementById("phoneError").textContent = "";
      phone.classList.remove("invalid");
    });

    password.addEventListener("input", function () {
      document.getElementById("passwordError").textContent = "";
      password.classList.remove("invalid");
      checkPasswordStrength(password.value);
    });

    confirmPassword.addEventListener("input", function () {
      document.getElementById("confirmPasswordError").textContent = "";
      confirmPassword.classList.remove("invalid");
    });

    fullname.addEventListener("blur", validateFullname);
    email.addEventListener("blur", validateEmail);
    phone.addEventListener("blur", validatePhone);
    password.addEventListener("blur", validatePassword);
    confirmPassword.addEventListener("blur", validateConfirmPassword);

    document.querySelectorAll('input[name="gender"]').forEach(radio => {
      radio.addEventListener("change", validateGender);
    });

    terms.addEventListener("change", validateTerms);

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const isValid =
        validateFullname() &
        validateEmail() &
        validatePhone() &
        validatePassword() &
        validateConfirmPassword() &
        validateGender() &
        validateTerms();

      if (isValid) {
        form.style.display = "none";
        successBox.style.display = "block";
        successBox.innerHTML = `Đăng ký thành công! 🎉<br>Xin chào, <b>${fullname.value.trim()}</b>`;
      }
    });

    updateFullnameCount();
    checkPasswordStrength("");
  </script>
</body>
</html>
