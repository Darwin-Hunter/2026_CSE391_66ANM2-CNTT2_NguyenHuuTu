<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bài tập về nhà 2 - Multi-step Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 30px auto;
      padding: 0 16px;
      background: #f8f9fa;
    }

    h1 {
      text-align: center;
      color: #1f4e79;
      margin-bottom: 24px;
    }

    .container {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }

    .progress-text {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
    }

    .progress-bar-wrap {
      width: 100%;
      height: 12px;
      background: #e9ecef;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progress-bar {
      height: 100%;
      width: 33.33%;
      background: #1f7aec;
      transition: 0.3s;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="date"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .radio-group label {
      display: inline;
      font-weight: normal;
      margin-right: 12px;
    }

    .error {
      color: red;
      font-size: 14px;
      display: block;
      margin-top: 4px;
      min-height: 18px;
    }

    .valid {
      border-color: green !important;
    }

    .invalid {
      border-color: red !important;
    }

    .button-group {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      color: white;
    }

    .btn-prev {
      background: #6c757d;
    }

    .btn-next {
      background: #1f7aec;
    }

    .summary-box {
      background: #f0f8ff;
      border-left: 4px solid #1f7aec;
      padding: 16px;
      border-radius: 8px;
      line-height: 1.8;
    }

    .success-box {
      display: none;
      text-align: center;
      background: #d1e7dd;
      color: #0f5132;
      padding: 20px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 18px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1> Đăng Ký Tài Khoản</h1>

  <div class="container" id="formContainer">
    <div class="progress-text" id="progressText">Bước 1 / 3</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Bước 1 -->
    <div class="step active" id="step1">
      <div class="form-group">
        <label for="fullname">Họ tên</label>
        <input type="text" id="fullname" />
        <span class="error" id="fullnameError"></span>
      </div>

      <div class="form-group">
        <label for="birthdate">Ngày sinh</label>
        <input type="date" id="birthdate" />
        <span class="error" id="birthdateError"></span>
      </div>

      <div class="form-group">
        <label>Giới tính</label>
        <div class="radio-group">
          <input type="radio" name="gender" id="male" value="Nam" />
          <label for="male">Nam</label>

          <input type="radio" name="gender" id="female" value="Nữ" />
          <label for="female">Nữ</label>

          <input type="radio" name="gender" id="other" value="Khác" />
          <label for="other">Khác</label>
        </div>
        <span class="error" id="genderError"></span>
      </div>

      <div class="button-group">
        <button class="btn-next" id="next1">Tiếp theo</button>
      </div>
    </div>

    <!-- Bước 2 -->
    <div class="step" id="step2">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" />
        <span class="error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" />
        <span class="error" id="passwordError"></span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <input type="password" id="confirmPassword" />
        <span class="error" id="confirmPasswordError"></span>
      </div>

      <div class="button-group">
        <button class="btn-prev" id="prev2">Quay lại</button>
        <button class="btn-next" id="next2">Tiếp theo</button>
      </div>
    </div>

    <!-- Bước 3 -->
    <div class="step" id="step3">
      <h3>Xác nhận thông tin</h3>
      <div class="summary-box" id="summaryBox"></div>

      <div class="button-group">
        <button class="btn-prev" id="prev3">Quay lại</button>
        <button class="btn-next" id="submitBtn">Hoàn tất đăng ký</button>
      </div>
    </div>
  </div>

  <div class="success-box" id="successBox"></div>

  <script>
    let currentStep = 1;

    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");
    const successBox = document.getElementById("successBox");
    const formContainer = document.getElementById("formContainer");

    const fullname = document.getElementById("fullname");
    const birthdate = document.getElementById("birthdate");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const summaryBox = document.getElementById("summaryBox");

    function showStep(step) {
      document.querySelectorAll(".step").forEach(item => {
        item.classList.remove("active");
      });

      document.getElementById("step" + step).classList.add("active");
      currentStep = step;

      progressText.textContent = `Bước ${step} / 3`;
      progressBar.style.width = `${(step / 3) * 100}%`;

      if (step === 3) {
        renderSummary();
      }
    }

    function showError(fieldId, message) {
      const field = document.getElementById(fieldId);
      const error = document.getElementById(fieldId + "Error");
      if (field) {
        field.classList.add("invalid");
        field.classList.remove("valid");
      }
      error.textContent = message;
    }

    function clearError(fieldId) {
      const field = document.getElementById(fieldId);
      const error = document.getElementById(fieldId + "Error");
      if (field) {
        field.classList.remove("invalid");
        field.classList.add("valid");
      }
      error.textContent = "";
    }

    function showGroupError(errorId, message) {
      document.getElementById(errorId).textContent = message;
    }

    function clearGroupError(errorId) {
      document.getElementById(errorId).textContent = "";
    }

    function validateFullname() {
      const value = fullname.value.trim();
      const regex = /^[a-zA-ZÀ-ỹ\s]+$/;

      if (value === "") {
        showError("fullname", "Họ tên không được để trống");
        return false;
      }
      if (value.length < 3) {
        showError("fullname", "Họ tên phải có ít nhất 3 ký tự");
        return false;
      }
      if (!regex.test(value)) {
        showError("fullname", "Họ tên chỉ chứa chữ cái và khoảng trắng");
        return false;
      }

      clearError("fullname");
      return true;
    }

    function validateBirthdate() {
      const value = birthdate.value;
      if (value === "") {
        showError("birthdate", "Vui lòng chọn ngày sinh");
        return false;
      }

      const selectedDate = new Date(value);
      const today = new Date();

      if (selectedDate > today) {
        showError("birthdate", "Ngày sinh không hợp lệ");
        return false;
      }

      clearError("birthdate");
      return true;
    }

    function validateGender() {
      const gender = document.querySelector('input[name="gender"]:checked');
      if (!gender) {
        showGroupError("genderError", "Vui lòng chọn giới tính");
        return false;
      }
      clearGroupError("genderError");
      return true;
    }

    function validateEmail() {
      const value = email.value.trim();
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (value === "") {
        showError("email", "Email không được để trống");
        return false;
      }
      if (!regex.test(value)) {
        showError("email", "Email không đúng định dạng");
        return false;
      }

      clearError("email");
      return true;
    }

    function validatePassword() {
      const value = password.value;
      const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

      if (value === "") {
        showError("password", "Mật khẩu không được để trống");
        return false;
      }
      if (!regex.test(value)) {
        showError("password", "Mật khẩu phải >= 8 ký tự, có chữ hoa, chữ thường và số");
        return false;
      }

      clearError("password");
      return true;
    }

    function validateConfirmPassword() {
      const value = confirmPassword.value;

      if (value === "") {
        showError("confirmPassword", "Vui lòng xác nhận mật khẩu");
        return false;
      }
      if (value !== password.value) {
        showError("confirmPassword", "Mật khẩu xác nhận không khớp");
        return false;
      }

      clearError("confirmPassword");
      return true;
    }

    function validateStep1() {
      return validateFullname() & validateBirthdate() & validateGender();
    }

    function validateStep2() {
      return validateEmail() & validatePassword() & validateConfirmPassword();
    }

    function getGenderValue() {
      const gender = document.querySelector('input[name="gender"]:checked');
      return gender ? gender.value : "";
    }

    function renderSummary() {
      summaryBox.innerHTML = `
        <p><b>Họ tên:</b> ${fullname.value.trim()}</p>
        <p><b>Ngày sinh:</b> ${birthdate.value}</p>
        <p><b>Giới tính:</b> ${getGenderValue()}</p>
        <p><b>Email:</b> ${email.value.trim()}</p>
      `;
    }

    fullname.addEventListener("blur", validateFullname);
    birthdate.addEventListener("blur", validateBirthdate);
    email.addEventListener("blur", validateEmail);
    password.addEventListener("blur", validatePassword);
    confirmPassword.addEventListener("blur", validateConfirmPassword);

    fullname.addEventListener("input", function () {
      document.getElementById("fullnameError").textContent = "";
      fullname.classList.remove("invalid");
    });

    birthdate.addEventListener("input", function () {
      document.getElementById("birthdateError").textContent = "";
      birthdate.classList.remove("invalid");
    });

    email.addEventListener("input", function () {
      document.getElementById("emailError").textContent = "";
      email.classList.remove("invalid");
    });

    password.addEventListener("input", function () {
      document.getElementById("passwordError").textContent = "";
      password.classList.remove("invalid");
    });

    confirmPassword.addEventListener("input", function () {
      document.getElementById("confirmPasswordError").textContent = "";
      confirmPassword.classList.remove("invalid");
    });

    document.querySelectorAll('input[name="gender"]').forEach(radio => {
      radio.addEventListener("change", validateGender);
    });

    document.getElementById("next1").addEventListener("click", function () {
      if (validateStep1()) {
        showStep(2);
      }
    });

    document.getElementById("prev2").addEventListener("click", function () {
      showStep(1);
    });

    document.getElementById("next2").addEventListener("click", function () {
      if (validateStep2()) {
        showStep(3);
      }
    });

    document.getElementById("prev3").addEventListener("click", function () {
      showStep(2);
    });

    document.getElementById("submitBtn").addEventListener("click", function () {
      formContainer.style.display = "none";
      successBox.style.display = "block";
      successBox.innerHTML = `Đăng ký thành công! 🎉<br>Chào mừng <b>${fullname.value.trim()}</b>`;
    });
  </script>
</body>
</html>
