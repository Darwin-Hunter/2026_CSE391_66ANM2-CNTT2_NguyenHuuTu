<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bài 1.1 - Bảng điểm sinh viên</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 30px auto;
      padding: 0 16px;
    }

    h1 {
      text-align: center;
      color: #1f4e79;
    }

    .form-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
    }

    input {
      flex: 1;
      min-width: 220px;
    }

    button {
      cursor: pointer;
      background: #1f7aec;
      color: white;
      border: none;
      border-radius: 6px;
    }

    button:hover {
      opacity: 0.9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #f2f2f2;
    }

    .weak-row {
      background: #fff3cd;
    }

    .delete-btn {
      background: #dc3545;
      padding: 6px 10px;
      border-radius: 4px;
    }

    .stats {
      margin-top: 16px;
      font-weight: bold;
      color: #0b5e2b;
    }
  </style>
</head>
<body>
  <h1>Bảng Điểm Sinh Viên</h1>

  <div class="form-group">
    <input type="text" id="fullname" placeholder="Nhập họ tên" />
    <input type="number" id="score" placeholder="Nhập điểm (0-10)" min="0" max="10" step="0.1" />
    <button id="addBtn">Thêm</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>STT</th>
        <th>Họ tên</th>
        <th>Điểm</th>
        <th>Xếp loại</th>
        <th>Thao tác</th>
      </tr>
    </thead>
    <tbody id="studentTableBody"></tbody>
  </table>

  <div class="stats" id="stats">
    Tổng số sinh viên: 0 | Điểm trung bình: 0.00
  </div>

  <script>
    const fullnameInput = document.getElementById("fullname");
    const scoreInput = document.getElementById("score");
    const addBtn = document.getElementById("addBtn");
    const tableBody = document.getElementById("studentTableBody");
    const stats = document.getElementById("stats");

    let students = [];

    function getRank(score) {
      if (score >= 8.5) return "Giỏi";
      if (score >= 7.0) return "Khá";
      if (score >= 5.0) return "Trung bình";
      return "Yếu";
    }

    function renderTable() {
      tableBody.innerHTML = "";

      students.forEach((student, index) => {
        const tr = document.createElement("tr");
        if (student.score < 5) {
          tr.classList.add("weak-row");
        }

        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${student.fullname}</td>
          <td>${student.score.toFixed(1)}</td>
          <td>${getRank(student.score)}</td>
          <td>
            <button class="delete-btn" data-index="${index}">Xóa</button>
          </td>
        `;

        tableBody.appendChild(tr);
      });

      updateStats();
    }

    function updateStats() {
      const total = students.length;
      const avg =
        total === 0
          ? 0
          : students.reduce((sum, student) => sum + student.score, 0) / total;

      stats.textContent = `Tổng số sinh viên: ${total} | Điểm trung bình: ${avg.toFixed(2)}`;
    }

    function addStudent() {
      const fullname = fullnameInput.value.trim();
      const score = Number(scoreInput.value);

      if (fullname === "") {
        alert("Họ tên không được để trống!");
        fullnameInput.focus();
        return;
      }

      if (isNaN(score) || score < 0 || score > 10) {
        alert("Điểm phải là số từ 0 đến 10!");
        scoreInput.focus();
        return;
      }

      students.push({ fullname, score });
      renderTable();

      fullnameInput.value = "";
      scoreInput.value = "";
      fullnameInput.focus();
    }

    addBtn.addEventListener("click", addStudent);

    scoreInput.addEventListener("keyup", function (event) {
      if (event.key === "Enter") {
        addStudent();
      }
    });

    // Event Delegation
    tableBody.addEventListener("click", function (event) {
      if (event.target.classList.contains("delete-btn")) {
        const index = Number(event.target.getAttribute("data-index"));
        students.splice(index, 1);
        renderTable();
      }
    });
  </script>
</body>
</html>
