<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bài 1.2 - Lọc và tìm kiếm danh sách</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 16px;
    }

    h1 {
      text-align: center;
      color: #1f4e79;
    }

    .top-form, .filter-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    input, select, button {
      padding: 10px;
      font-size: 16px;
    }

    input, select {
      flex: 1;
      min-width: 220px;
    }

    button {
      background: #1f7aec;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #f2f2f2;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
    }

    .weak-row {
      background: #fff3cd;
    }

    .delete-btn {
      background: #dc3545;
      padding: 6px 10px;
      border-radius: 4px;
    }

    .stats {
      margin-top: 16px;
      font-weight: bold;
      color: #0b5e2b;
    }

    .no-result {
      text-align: center;
      color: red;
      font-style: italic;
      padding: 16px;
    }
  </style>
</head>
<body>
  <h1>Bộ Lọc & Tìm Kiếm Danh Sách Sinh Viên</h1>

  <div class="top-form">
    <input type="text" id="fullname" placeholder="Nhập họ tên" />
    <input type="number" id="score" placeholder="Nhập điểm (0-10)" min="0" max="10" step="0.1" />
    <button id="addBtn">Thêm</button>
  </div>

  <div class="filter-box">
    <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên..." />
    <select id="rankFilter">
      <option value="all">Tất cả</option>
      <option value="Giỏi">Giỏi</option>
      <option value="Khá">Khá</option>
      <option value="Trung bình">Trung bình</option>
      <option value="Yếu">Yếu</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th>STT</th>
        <th>Họ tên</th>
        <th id="scoreHeader" class="sortable">Điểm</th>
        <th>Xếp loại</th>
        <th>Thao tác</th>
      </tr>
    </thead>
    <tbody id="studentTableBody"></tbody>
  </table>

  <div class="stats" id="stats">
    Tổng số sinh viên: 0 | Điểm trung bình: 0.00
  </div>

  <script>
    const fullnameInput = document.getElementById("fullname");
    const scoreInput = document.getElementById("score");
    const addBtn = document.getElementById("addBtn");
    const searchInput = document.getElementById("searchInput");
    const rankFilter = document.getElementById("rankFilter");
    const scoreHeader = document.getElementById("scoreHeader");
    const tableBody = document.getElementById("studentTableBody");
    const stats = document.getElementById("stats");

    let students = [];
    let filteredStudents = [];
    let sortOrder = null; // null | asc | desc

    function getRank(score) {
      if (score >= 8.5) return "Giỏi";
      if (score >= 7.0) return "Khá";
      if (score >= 5.0) return "Trung bình";
      return "Yếu";
    }

    function updateStats(list) {
      const total = list.length;
      const avg = total === 0
        ? 0
        : list.reduce((sum, student) => sum + student.score, 0) / total;

      stats.textContent = `Tổng số sinh viên: ${total} | Điểm trung bình: ${avg.toFixed(2)}`;
    }

    function renderTable() {
      tableBody.innerHTML = "";

      if (filteredStudents.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="5" class="no-result">Không có kết quả</td></tr>`;
        updateStats(filteredStudents);
        return;
      }

      filteredStudents.forEach((student, index) => {
        const tr = document.createElement("tr");
        if (student.score < 5) tr.classList.add("weak-row");

        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${student.fullname}</td>
          <td>${student.score.toFixed(1)}</td>
          <td>${getRank(student.score)}</td>
          <td><button class="delete-btn" data-id="${student.id}">Xóa</button></td>
        `;

        tableBody.appendChild(tr);
      });

      updateStats(filteredStudents);
    }

    function applyFilters() {
      const keyword = searchInput.value.trim().toLowerCase();
      const selectedRank = rankFilter.value;

      filteredStudents = students.filter(student => {
        const matchName = student.fullname.toLowerCase().includes(keyword);
        const rank = getRank(student.score);
        const matchRank = selectedRank === "all" || rank === selectedRank;
        return matchName && matchRank;
      });

      if (sortOrder === "asc") {
        filteredStudents.sort((a, b) => a.score - b.score);
      } else if (sortOrder === "desc") {
        filteredStudents.sort((a, b) => b.score - a.score);
      }

      scoreHeader.textContent = "Điểm";
      if (sortOrder === "asc") scoreHeader.textContent += " ▲";
      if (sortOrder === "desc") scoreHeader.textContent += " ▼";

      renderTable();
    }

    function addStudent() {
      const fullname = fullnameInput.value.trim();
      const score = Number(scoreInput.value);

      if (fullname === "") {
        alert("Họ tên không được để trống!");
        fullnameInput.focus();
        return;
      }

      if (isNaN(score) || score < 0 || score > 10) {
        alert("Điểm phải từ 0 đến 10!");
        scoreInput.focus();
        return;
      }

      students.push({
        id: Date.now(),
        fullname,
        score
      });

      fullnameInput.value = "";
      scoreInput.value = "";
      fullnameInput.focus();

      applyFilters();
    }

    addBtn.addEventListener("click", addStudent);

    scoreInput.addEventListener("keyup", function(event) {
      if (event.key === "Enter") {
        addStudent();
      }
    });

    searchInput.addEventListener("input", applyFilters);
    rankFilter.addEventListener("change", applyFilters);

    scoreHeader.addEventListener("click", function() {
      if (sortOrder === null) sortOrder = "asc";
      else if (sortOrder === "asc") sortOrder = "desc";
      else sortOrder = "asc";

      applyFilters();
    });

    tableBody.addEventListener("click", function(event) {
      if (event.target.classList.contains("delete-btn")) {
        const id = Number(event.target.getAttribute("data-id"));
        students = students.filter(student => student.id !== id);
        applyFilters();
      }
    });

    applyFilters();
  </script>
</body>
</html>
